<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrally</title>
  <!-- =================================================================
       app.html — SHELL ONLY
       The page skeleton + nav. All styles and view logic live in
       separate files, loaded at the bottom. This file rarely changes;
       edit the JS/CSS files instead.

       Files this expects (relative to app.html):
         assets/css/app.css
         assets/js/shell.js     (loaded FIRST — defines api, helpers, router)
         assets/js/profile.js   (profile + public profile + score views)
         assets/js/feed.js      (feed view, composer, posts)
       ================================================================= -->
  <link rel="stylesheet" href="assets/css/app.css?v=21">
</head>
<body>

<!-- ===================== SHELL: NAV ===================== -->
<nav class="in-nav">
  <div class="in-nav-inner">
    <div class="in-brand" id="brand-home" role="button" tabindex="0"><span class="in-mark">I</span> Integrally</div>
    <div class="in-nav-links">
      <button data-nav="feed">Feed</button>
      <button data-nav="company-feed" style="display:none">Feed</button>
      <button data-nav="connect">Connect</button>
      <button data-nav="jobs">Jobs</button>
      <button class="active" data-nav="profile">Profile</button>
      <button data-nav="admin" style="display:none">Admin</button>
      <!-- search (signed-in): grouped with nav items, styled distinctly -->
      <button id="search-trigger" class="in-navsearch" title="Search" aria-label="Search" aria-expanded="false" style="display:none">
        <span class="in-navsearch-ico" aria-hidden="true">🔍</span>
        <span class="in-navsearch-label">Search</span>
      </button>
    </div>
    <div class="in-nav-right">
      <!-- messages envelope (signed-in users) -->
      <div class="in-notif" id="msg-menu" style="display:none">
        <button class="in-notif-trigger" id="msg-trigger" title="Messages">
          ✉️<span class="in-notif-badge" id="msg-badge" style="display:none">0</span>
        </button>
      </div>
      <!-- notification bell (signed in) -->
      <div class="in-notif" id="notif-menu" style="display:none">
        <button class="in-notif-trigger" id="notif-trigger" title="Notifications">
          🔔<span class="in-notif-badge" id="notif-badge" style="display:none">0</span>
        </button>
        <div class="in-notif-dropdown" id="notif-dropdown">
          <div class="in-notif-head">
            <span>Notifications</span>
            <button id="notif-readall" class="in-notif-readall">Mark all read</button>
          </div>
          <div class="in-notif-list" id="notif-list"></div>
          <button class="in-notif-seeall" id="notif-seeall">See all</button>
        </div>
      </div>
      <!-- logged-in: profile menu -->
      <div class="in-profile-menu" id="profile-menu" style="display:none">
        <button class="in-profile-trigger" id="profile-trigger">
          <span class="in-profile-ava" id="nav-ava">?</span>
          <span class="in-nav-user" id="nav-user"></span>
          <span class="in-caret">▾</span>
        </button>
        <div class="in-dropdown" id="profile-dropdown">
          <button data-menu="edit">Edit profile</button>
          <button data-menu="saved">Saved posts</button>
          <button data-menu="jobsearch">Job Search</button>
          <button data-menu="settings">Settings</button>
          <div class="in-dropdown-sep"></div>
          <button data-menu="signout" class="danger">Sign out</button>
        </div>
      </div>
      <!-- logged-out: sign up / sign in dropdown -->
      <div class="in-authmenu" id="auth-menu" style="display:none">
        <button class="in-authbtn" id="auth-trigger">Sign up / Sign in <span class="in-caret">▾</span></button>
        <div class="in-dropdown in-authdrop" id="auth-dropdown">
          <button data-auth="signup" class="in-auth-signup">Sign up</button>
          <div class="in-dropdown-sep"></div>
          <div class="in-auth-form">
            <div class="in-auth-formlabel">Already have an account?</div>
            <input type="text" id="qs-login" placeholder="Email or username" autocomplete="username">
            <input type="password" id="qs-pass" placeholder="Password" autocomplete="current-password">
            <div class="in-auth-msg" id="qs-msg"></div>
            <button class="in-btn primary" id="qs-go" style="width:100%">Sign in</button>
          </div>
          <div class="in-dropdown-sep"></div>
          <button data-auth="company" style="text-align:center;font-size:13px">For companies →</button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- search drop-down bar (revealed by the nav search icon) -->
<div class="in-searchbar" id="searchbar" aria-hidden="true">
  <div class="in-searchbar-inner">
    <span class="in-searchbar-ico" aria-hidden="true">🔍</span>
    <input type="text" id="searchbar-input" class="in-searchbar-input"
           placeholder="Search people, companies, and jobs…"
           autocomplete="off" spellcheck="false">
    <button class="in-searchbar-go" id="searchbar-go">Search</button>
    <button class="in-searchbar-close" id="searchbar-close" aria-label="Close search">✕</button>
  </div>
</div>

<div class="in-main" id="view"><div class="in-loading">Loading…</div></div>

<!-- ===================== SHELL: FOOTER ===================== -->
<footer class="in-footer">
  <div class="in-footer-inner">
    <div class="in-footer-brand">
      <span class="in-mark in-footer-mark">I</span>
      <span class="in-footer-word">Integrally</span>
    </div>
    <nav class="in-footer-links">
      <button data-footer-nav="about">About Us</button>
      <button data-footer-nav="careers">Careers</button>
      <button data-footer-nav="contact">Contact</button>
      <button data-footer-nav="help">Help</button>
      <button data-footer-nav="privacy">Privacy Policy</button>
      <button data-footer-nav="terms">Terms of Service</button>
    </nav>
    <div class="in-footer-copy">&copy; <span id="footer-year"></span> Integrally. All rights reserved.</div>
  </div>
</footer>

<!-- generic modal mount -->
<div class="in-overlay" id="overlay"><div class="in-modal" id="modal"></div></div>

<!-- ===================== SCRIPTS (order matters) ===================== -->
<script src="assets/js/geo.js"></script>
<script src="assets/js/jobs-catalog.js"></script>
<script src="assets/js/education-catalog.js"></script>
<script src="assets/js/shell.js?v=5"></script>
<script src="assets/js/profile.js?v=17"></script>
<script src="assets/js/feed.js?v=13"></script>
<script src="assets/js/admin.js?v=2"></script>
<script src="assets/js/jobs.js?v=6"></script>
<script src="assets/js/connect.js?v=2"></script>
<script src="assets/js/search.js?v=3"></script>
<script src="assets/js/notifications.js?v=1"></script>
<script src="assets/js/messages.js?v=2"></script>
<script src="assets/js/company.js?v=5"></script>
<script>
  // Everything is defined; start the app.
  boot();
</script>
</body>
</html>
